apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab3-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab3-api
  template:
    metadata:
      labels:
        app: lab3-api
    spec:
      containers:
      - name: lab3-api
        image: my-lab2-api
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: lab3-api
spec:
  type: NodePort
  selector:
    app: lab3-api
  ports:
    - port: 3000
      targetPort: 3000