name: Node.js CI/CD Pipeline

# Пайплайн запускається при кожному push в гілку main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Отримання коду з репозиторію
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. Налаштування Node.js (Пайплайн побудови)
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    # 3. Встановлення залежностей та гіпотетичні тести
    - name: Install dependencies
      run: npm install
      
    # Тут міг би бути крок npm test, якби ми мали unit-тести

    # 4. Авторизація в Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 5. Побудова Docker-образу (Артефакту)
    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/lab5-api:latest .

    # 6. Розгортання (Delivery) артефакту в Docker Hub
    - name: Push Docker image to Docker Hub
      run: docker push ${{ secrets.DOCKER_USERNAME }}/lab5-api:latest